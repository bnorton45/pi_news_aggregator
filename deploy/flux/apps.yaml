# Reconciles the HelmRelease after policies + secrets are in place.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./deploy/flux/apps
  prune: true
  # Deliberately independent of the (suspended-until-bootstrap) secrets Kustomization —
  # pods just ImagePullBackOff harmlessly until the encrypted pull secret lands.
  dependsOn:
    - name: policies
  sourceRef:
    kind: GitRepository
    name: flux-system
