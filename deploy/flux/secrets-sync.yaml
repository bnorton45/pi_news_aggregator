# Reconciles deploy/secrets (SOPS-encrypted, PLAN §3.5-§3.6): today only the GHCR
# pull secret. Decryption uses the in-cluster age key (Secret sops-age, created by
# the bootstrap runbook — the private key NEVER enters the repo).
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: secrets
  namespace: flux-system
spec:
  # Suspended until the bootstrap runbook creates ghcr-pull.sops.yaml + the sops-age
  # key (`flux resume kustomization secrets`). Until then image pulls simply wait;
  # the k3d dev loop never needs this (values-dev sets imagePullSecret: "").
  suspend: true
  interval: 10m
  path: ./deploy/secrets
  prune: true
  dependsOn:
    - name: policies # namespaces must exist
  sourceRef:
    kind: GitRepository
    name: flux-system
  decryption:
    provider: sops
    secretRef:
      name: sops-age
