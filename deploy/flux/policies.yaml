# Reconciles deploy/policies FIRST (namespaces, PSS, netpol, RBAC) so every workload
# lands inside the fences. `flux bootstrap` creates the flux-system GitRepository this
# and the other Kustomizations pull from.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: policies
  namespace: flux-system
spec:
  interval: 10m
  path: ./deploy/policies
  prune: true
  wait: true
  sourceRef:
    kind: GitRepository
    name: flux-system
