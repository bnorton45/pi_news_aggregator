{{- if .Values.wikipedia.enabled }}
# Wikipedia EventStreams ingester (zone-ingest DMZ): parses internet data => least
# power (PLAN §3.1). role=ingester matches the netpol allowing ONLY upstream-443 +
# NATS publish. Disabled in values-dev: the CI e2e stays single-source (see noaa.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-wikipedia
  namespace: zone-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wikipedia
  template:
    metadata:
      labels:
        app: wikipedia
        role: ingester
    spec:
      serviceAccountName: ingest-wikipedia
      automountServiceAccountToken: false
      {{- include "na.pullSecrets" . | nindent 6 }}
      {{- if .Values.priorityClasses.enabled }}
      priorityClassName: na-pipeline
      {{- end }}
      {{- include "na.nodeAffinity" (list "compute" .Values) | nindent 6 }}
      {{- include "na.podSecurity" 10001 | nindent 6 }}
      containers:
        - name: wikipedia
          image: {{ include "na.image" (list "wikipedia" .Values) | quote }}
          # the shared Dockerfile sets no CMD; each role names its module
          command: ["python", "-m", "services.ingest.wikipedia.main"]
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          {{- include "na.containerSecurity" . | nindent 10 }}
          env:
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nats-wikipedia
                  key: password
            - name: NATS_URL
              value: "nats://wikipedia:$(NATS_PASSWORD)@nats.zone-data.svc:4222"
            - name: WIKI_DOMAINS
              value: {{ .Values.wikipedia.domains | join "," | quote }}
            - name: WIKI_SKIP_MINOR
              value: {{ .Values.wikipedia.skipMinor | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
          resources: {{- toYaml .Values.wikipedia.resources | nindent 12 }}
{{- end }}
