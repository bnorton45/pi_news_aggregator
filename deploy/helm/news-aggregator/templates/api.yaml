{{- if .Values.api.enabled }}
# Read API + dashboard (PLAN §6.8): the ONLY user-reachable workload, in
# zone-present behind traefik. Authenticates to Postgres as api_ro (SELECT-only
# grant); role=api opens exactly the 5432 route + the traefik ingress in the
# netpols. Serves the vendored SPA itself — this zone has no internet.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: zone-present
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
        role: api
    spec:
      serviceAccountName: api
      automountServiceAccountToken: false
      # The `api` Service would inject API_PORT="tcp://..." (legacy docker-links
      # env) into this pod and shadow app config — crashed the pod on 2026-07-05.
      enableServiceLinks: false
      {{- include "na.pullSecrets" . | nindent 6 }}
      {{- if .Values.priorityClasses.enabled }}
      priorityClassName: na-pipeline
      {{- end }}
      {{- include "na.nodeAffinity" (list "compute" .Values) | nindent 6 }}
      {{- include "na.podSecurity" 10001 | nindent 6 }}
      containers:
        - name: api
          image: {{ include "na.image" (list "api" .Values) | quote }}
          # the shared Dockerfile sets no CMD; each role names its module
          command: ["python", "-m", "services.api.main"]
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          {{- include "na.containerSecurity" . | nindent 10 }}
          ports:
            - { containerPort: 8000, name: http }
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-api
                  key: password
            - name: POSTGRES_DSN
              value: "postgresql://api_ro:$(POSTGRES_PASSWORD)@postgres.zone-data.svc:5432/{{ .Values.postgres.database }}"
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources: {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: zone-present
spec:
  selector:
    app: api
  ports:
    - { name: http, port: 8000, targetPort: http }
---
# Traefik (k3s bundled ingress) is the only thing allowed through the netpol.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: api
  namespace: zone-present
spec:
  ingressClassName: traefik
  rules:
    - http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: api
                port: { name: http }
{{- end }}
