# USGS ingester (zone-ingest DMZ): parses internet data => least power (PLAN §3.1).
# role=ingester matches the netpol allowing ONLY upstream-443 + NATS publish.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-usgs
  namespace: zone-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: usgs
  template:
    metadata:
      labels:
        app: usgs
        role: ingester
    spec:
      serviceAccountName: ingest-usgs
      automountServiceAccountToken: false
      {{- include "na.pullSecrets" . | nindent 6 }}
      {{- if .Values.priorityClasses.enabled }}
      priorityClassName: na-pipeline
      {{- end }}
      {{- include "na.nodeAffinity" (list "compute" .Values) | nindent 6 }}
      {{- include "na.podSecurity" 10001 | nindent 6 }}
      containers:
        - name: usgs
          image: {{ include "na.image" (list "usgs" .Values) | quote }}
          # the shared Dockerfile sets no CMD; each role names its module
          command: ["python", "-m", "services.ingest.usgs.main"]
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          {{- include "na.containerSecurity" . | nindent 10 }}
          env:
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nats-usgs
                  key: password
            - name: NATS_URL
              value: "nats://usgs:$(NATS_PASSWORD)@nats.zone-data.svc:4222"
            - name: USGS_POLL_SECONDS
              value: {{ .Values.usgs.pollSeconds | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
          resources: {{- toYaml .Values.usgs.resources | nindent 12 }}
