{{- if .Values.bluesky.enabled }}
# Bluesky Jetstream ingester (zone-ingest DMZ): parses internet data => least power
# (PLAN §3.1). role=ingester matches the netpol allowing ONLY upstream-443 + NATS
# publish. Disabled in values-dev: the CI e2e stays single-source (see noaa.yaml).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-bluesky
  namespace: zone-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bluesky
  template:
    metadata:
      labels:
        app: bluesky
        role: ingester
    spec:
      serviceAccountName: ingest-bluesky
      automountServiceAccountToken: false
      {{- include "na.pullSecrets" . | nindent 6 }}
      {{- if .Values.priorityClasses.enabled }}
      priorityClassName: na-pipeline
      {{- end }}
      {{- include "na.nodeAffinity" (list "compute" .Values) | nindent 6 }}
      {{- include "na.podSecurity" 10001 | nindent 6 }}
      containers:
        - name: bluesky
          image: {{ include "na.image" (list "bluesky" .Values) | quote }}
          # the shared Dockerfile sets no CMD; each role names its module
          command: ["python", "-m", "services.ingest.bluesky.main"]
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          {{- include "na.containerSecurity" . | nindent 10 }}
          env:
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nats-bluesky
                  key: password
            - name: NATS_URL
              value: "nats://bluesky:$(NATS_PASSWORD)@nats.zone-data.svc:4222"
            - name: BSKY_LANGS
              value: {{ .Values.bluesky.langs | join "," | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
          resources: {{- toYaml .Values.bluesky.resources | nindent 12 }}
{{- end }}
