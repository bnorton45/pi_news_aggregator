{{- if .Values.dod.enabled }}
# U.S. Dept of Defense (war.gov) news-release ingester (zone-ingest DMZ): parses internet data
# => least power (PLAN §3.1). role=ingester matches the netpol allowing ONLY
# upstream-443 + NATS publish. Disabled in values-dev: the CI e2e stays single-source
# (its llm.heavy gate assert depends on origins=1), and each source keeps its own switch.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-dod
  namespace: zone-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dod
  template:
    metadata:
      labels:
        app: dod
        role: ingester
    spec:
      serviceAccountName: ingest-dod
      automountServiceAccountToken: false
      {{- include "na.pullSecrets" . | nindent 6 }}
      {{- if .Values.priorityClasses.enabled }}
      priorityClassName: na-pipeline
      {{- end }}
      {{- include "na.nodeAffinity" (list "compute" .Values) | nindent 6 }}
      {{- include "na.podSecurity" 10001 | nindent 6 }}
      containers:
        - name: dod
          image: {{ include "na.image" (list "dod" .Values) | quote }}
          # the shared Dockerfile sets no CMD; each role names its module
          command: ["python", "-m", "services.ingest.dod.main"]
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          {{- include "na.containerSecurity" . | nindent 10 }}
          env:
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nats-dod
                  key: password
            - name: NATS_URL
              value: "nats://state:$(NATS_PASSWORD)@nats.zone-data.svc:4222"
            - name: DOD_POLL_SECONDS
              value: {{ .Values.dod.pollSeconds | quote }}
            {{- if .Values.dod.userAgent }}
            - name: DOD_USER_AGENT
              value: {{ .Values.dod.userAgent | quote }}
            {{- end }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
          resources: {{- toYaml .Values.dod.resources | nindent 12 }}
{{- end }}
