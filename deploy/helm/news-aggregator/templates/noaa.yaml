{{- if .Values.noaa.enabled }}
# NOAA/NWS ingester (zone-ingest DMZ): parses internet data => least power (PLAN §3.1).
# role=ingester matches the netpol allowing ONLY upstream-443 + NATS publish.
# Disabled in values-dev: the CI e2e stays single-source (its llm.heavy gate assert
# depends on origins=1), and each new source keeps its own kill switch anyway.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingest-noaa
  namespace: zone-ingest
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noaa
  template:
    metadata:
      labels:
        app: noaa
        role: ingester
    spec:
      serviceAccountName: ingest-noaa
      automountServiceAccountToken: false
      {{- include "na.pullSecrets" . | nindent 6 }}
      {{- if .Values.priorityClasses.enabled }}
      priorityClassName: na-pipeline
      {{- end }}
      {{- include "na.nodeAffinity" (list "compute" .Values) | nindent 6 }}
      {{- include "na.podSecurity" 10001 | nindent 6 }}
      containers:
        - name: noaa
          image: {{ include "na.image" (list "noaa" .Values) | quote }}
          # the shared Dockerfile sets no CMD; each role names its module
          command: ["python", "-m", "services.ingest.noaa.main"]
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          {{- include "na.containerSecurity" . | nindent 10 }}
          env:
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nats-noaa
                  key: password
            - name: NATS_URL
              value: "nats://noaa:$(NATS_PASSWORD)@nats.zone-data.svc:4222"
            - name: NOAA_POLL_SECONDS
              value: {{ .Values.noaa.pollSeconds | quote }}
            {{- if .Values.noaa.userAgent }}
            - name: NOAA_USER_AGENT
              value: {{ .Values.noaa.userAgent | quote }}
            {{- end }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
          resources: {{- toYaml .Values.noaa.resources | nindent 12 }}
{{- end }}
