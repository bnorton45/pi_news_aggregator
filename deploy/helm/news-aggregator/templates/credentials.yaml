  namespace: zone-ingest
type: Opaque
stringData:
  password: {{ index $nats "mastodon" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: nats-gdelt
  namespace: zone-ingest
type: Opaque
stringData:
  password: {{ index $nats "gdelt" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: nats-enrich
  namespace: zone-process
type: Opaque
stringData:
  password: {{ index $nats "enrich" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: nats-writer
  namespace: zone-process
type: Opaque
