{{- /*
Generate-in-cluster credentials (PLAN §3.5): NATS per-service passwords + the
Postgres app password are random on first install and PRESERVED on upgrade via
`lookup` of the canonical zone-data Secrets. All Secrets are emitted from this ONE
template so every namespace copy carries the SAME generated value.

`helm template` (offline) has no cluster: lookup returns nil and fresh randoms are
rendered — fine for validation, never apply offline output to a live cluster.
Rotation is a follow-up hardening candidate: replace with an operator/init-job if needed.
*/ -}}
{{- $prevNats := lookup "v1" "Secret" "zone-data" "nats-creds" }}
{{- $prevPg := lookup "v1" "Secret" "zone-data" "postgres-creds" }}
{{- $users := list "sys" "usgs" "noaa" "gdacs" "wikipedia" "bluesky" "mastodon" "gdelt" "state" "dod" "cisa" "cdc" "enrich" "writer" "cluster" "claimx" "trust" "retrain" }}
{{- $nats := dict }}
{{- range $u := $users }}
{{- if $prevNats }}
{{- $_ := set $nats $u (index $prevNats.data (printf "pass-%s" $u) | b64dec) }}
{{- else }}
{{- /* First char forced alphabetic: nats-server substitutes $NATS_PASS_* into
nats-accounts.conf and re-PARSES the value as a config token — a draw that starts
numeric ("7e39…" reads as a float) is a fatal parse error and crashloops the
broker. Random 1-in-~6 per fresh install per user; bit the multinode e2e
2026-07-07. */}}
{{- $_ := set $nats $u (printf "%s%s" (randAlpha 1) (randAlphaNum 31)) }}
{{- end }}
{{- end }}
{{- $pgPass := randAlphaNum 32 }}
{{- if $prevPg }}
{{- $pgPass = index $prevPg.data "password" | b64dec }}
{{- end }}
{{- $pgRoPass := randAlphaNum 32 }}
{{- if and $prevPg (hasKey $prevPg.data "password-ro") }}
{{- $pgRoPass = index $prevPg.data "password-ro" | b64dec }}
{{- end }}
{{- $pgRetrainPass := randAlphaNum 32 }}
{{- if and $prevPg (hasKey $prevPg.data "password-retrain") }}
{{- $pgRetrainPass = index $prevPg.data "password-retrain" | b64dec }}
{{- end }}
{{- $prevNtfy := lookup "v1" "Secret" "zone-present" "ntfy-pub" }}
{{- $ntfyPass := randAlphaNum 32 }}
{{- if and $prevNtfy (hasKey $prevNtfy.data "password") }}
{{- $ntfyPass = index $prevNtfy.data "password" | b64dec }}
{{- end }}
{{- $prevGrafana := lookup "v1" "Secret" "zone-data" "grafana-admin" }}
{{- $grafanaPass := randAlphaNum 32 }}
{{- if and $prevGrafana (hasKey $prevGrafana.data "admin-password") }}
{{- $grafanaPass = index $prevGrafana.data "admin-password" | b64dec }}
{{- end }}
---
# Canonical store (zone-data): the NATS server env + upgrade-preservation source.
# resource-policy keep: an uninstall (incl. flux install-failure remediation) must
# NOT delete these — postgres' PGDATA outlives the release on its PVC, so freshly
# generated passwords would strand every DB client (bit the k3d e2e 2026-07-05).
apiVersion: v1
kind: Secret
metadata:
  name: nats-creds
  namespace: zone-data
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{- range $u := $users }}
  pass-{{ $u }}: {{ index $nats $u | quote }}
  {{- end }}
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-creds
  namespace: zone-data
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  password: {{ $pgPass | quote }}
  # api_ro: the SELECT-only role the zone-present API authenticates as (§6.8);
  # created at first initdb by files/readonly_role.sh.
  password-ro: {{ $pgRoPass | quote }}
  # retrain_ro: the weak_labels-SELECT + system_state-write role the retrain worker
  # authenticates as (§6.3); created at first initdb by files/retrain_role.sh.
  password-retrain: {{ $pgRetrainPass | quote }}
---
# Per-service copies: each zone sees ONLY the credentials it needs (PLAN §3.1).
apiVersion: v1
kind: Secret
metadata:
  name: nats-usgs
  namespace: zone-ingest
type: Opaque
stringData:
  password: {{ index $nats "usgs" | quote }}
---
apiVersion: v1
kind: Secret
metadata:
  name: nats-noaa
  namespace: zone-ingest
type: Opaque
stringData:
