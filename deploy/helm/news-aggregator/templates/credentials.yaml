---
# Structured-data DSNs (§3.3): db-writer + cluster + trust are the ONLY zone-process
# pods with a DB RW credential — they run parameterized SQL over stored fields, never a
# model over raw text.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-app
  namespace: zone-process
type: Opaque
stringData:
  password: {{ $pgPass | quote }}
---
# retrain: the read-only weak_labels + system_state-write credential (§6.3). Separate
# from postgres-app — the retrain worker never gets the RW password.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-retrain
  namespace: zone-process
type: Opaque
stringData:
  password: {{ $pgRetrainPass | quote }}
---
# zone-present sees ONLY the read-only credential (PLAN §3.1/§6.8).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-api
  namespace: zone-present
type: Opaque
stringData:
  password: {{ $pgRoPass | quote }}
---
# ntfy publisher credential (PLAN §6.8): ONE generated value, two forms — the
# plaintext for the notify pod's Basic auth, the bcrypt hash for the ntfy
# server's declarative NTFY_AUTH_USERS (the hash re-salts every render; the
# password itself is lookup-preserved above, so both halves always agree).
apiVersion: v1
kind: Secret
metadata:
  name: ntfy-pub
  namespace: zone-present
type: Opaque
stringData:
  password: {{ $ntfyPass | quote }}
  auth-users: {{ printf "publisher:%s:user" (bcrypt $ntfyPass) | quote }}
{{- if .Values.monitoring.enabled }}
---
# Grafana admin (PLAN §7): generated on first install, lookup-preserved on upgrade so
# a redeploy never rotates the operator's login. LAN-only behind traefik.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: zone-data
type: Opaque
stringData:
  admin-password: {{ $grafanaPass | quote }}
{{- end }}
