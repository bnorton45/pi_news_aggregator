{{- if .Values.retrain.enabled }}
# Retrain worker (PLAN §6.3 step 2, §4): weak labels -> train -> eval gate -> models KV.
# role=retrain opens exactly Postgres:5432 (read weak_labels, write system_state as the
# read-only retrain_ro role) + NATS (models-KV write). It processes stored text but holds
# only a read-only DB role and a models-KV-write NATS user — the eval gate, not this ACL,
# is what contains a weak-label poisoning attempt.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: retrain
  namespace: zone-process
spec:
  replicas: 1
  selector:
    matchLabels:
      app: retrain
  template:
    metadata:
      labels:
        app: retrain
        role: retrain
    spec:
      serviceAccountName: retrain
      automountServiceAccountToken: false
      enableServiceLinks: false
      {{- include "na.pullSecrets" . | nindent 6 }}
      {{- if .Values.priorityClasses.enabled }}
      priorityClassName: na-pipeline
      {{- end }}
      {{- include "na.nodeAffinity" (list "compute" .Values) | nindent 6 }}
      {{- include "na.podSecurity" 10001 | nindent 6 }}
      containers:
        - name: retrain
          image: {{ include "na.image" (list "retrain" .Values) | quote }}
          # the shared Dockerfile sets no CMD; each role names its module
          command: ["python", "-m", "services.retrain.main"]
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          {{- include "na.containerSecurity" . | nindent 10 }}
          env:
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nats-retrain
                  key: password
            - name: NATS_URL
              value: "nats://retrain:$(NATS_PASSWORD)@nats.zone-data.svc:4222"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-retrain
                  key: password
            - name: POSTGRES_DSN
              value: "postgresql://retrain_ro:$(POSTGRES_PASSWORD)@postgres.zone-data.svc:5432/{{ .Values.postgres.database }}"
            - name: MODELS_KV_BUCKET
              value: {{ .Values.retrain.modelsBucket | quote }}
            - name: RETRAIN_INTERVAL_S
              value: {{ .Values.retrain.intervalSeconds | quote }}
            - name: RETRAIN_MIN_ROWS
              value: {{ .Values.retrain.minRows | quote }}
            - name: RETRAIN_MIN_PER_CLASS
              value: {{ .Values.retrain.minPerClass | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
          resources: {{- toYaml .Values.retrain.resources | nindent 12 }}
{{- end }}
