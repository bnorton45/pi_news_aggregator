{{- if .Values.trust.enabled }}
# Trust worker (PLAN §6.5): claim-level primary-record matching. Structured-data pod
# like the writer (parameterized SQL, no model over raw text — §3.3); role=trust opens
# its 5432 route in the netpol. NATS consume-only on CLAIM: it can publish nothing.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: trust
  namespace: zone-process
spec:
  replicas: 1
  selector:
    matchLabels:
      app: trust
  template:
    metadata:
      labels:
        app: trust
        role: trust
    spec:
      serviceAccountName: trust
      automountServiceAccountToken: false
      {{- include "na.pullSecrets" . | nindent 6 }}
      {{- if .Values.priorityClasses.enabled }}
      priorityClassName: na-pipeline
      {{- end }}
      {{- include "na.nodeAffinity" (list "state" .Values) | nindent 6 }}
      {{- include "na.podSecurity" 10001 | nindent 6 }}
      containers:
        - name: trust
          image: {{ include "na.image" (list "trust" .Values) | quote }}
          # the shared Dockerfile sets no CMD; each role names its module
          command: ["python", "-m", "services.trust.main"]
          imagePullPolicy: {{ .Values.images.pullPolicy }}
          {{- include "na.containerSecurity" . | nindent 10 }}
          env:
            - name: NATS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nats-trust
                  key: password
            - name: NATS_URL
              value: "nats://trust:$(NATS_PASSWORD)@nats.zone-data.svc:4222"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-app
                  key: password
            - name: POSTGRES_DSN
              value: "postgresql://{{ .Values.postgres.user }}:$(POSTGRES_PASSWORD)@postgres.zone-data.svc:5432/{{ .Values.postgres.database }}"
            - name: LOG_LEVEL
              value: {{ .Values.logLevel | quote }}
          resources: {{- toYaml .Values.trust.resources | nindent 12 }}
{{- end }}
