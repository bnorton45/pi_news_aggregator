# Least-priv RBAC (PLAN §3.1): NO application workload talks to the Kubernetes API,
# so there are deliberately ZERO Roles/RoleBindings here — the least privilege is no
# privilege. Every ServiceAccount sets automountServiceAccountToken: false, and each
# zone's `default` SA is overridden likewise so an unlabeled pod gets no token either.
# (Flux/monitoring controllers bring their own RBAC in their own namespaces.)
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: default, namespace: zone-ingest }
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: default, namespace: zone-process }
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: default, namespace: zone-data }
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata: { name: default, namespace: zone-present }
automountServiceAccountToken: false
---
