# NATS accounts & per-service authorization (PLAN §3.1, §3.5).
#
# DESIGN NOTE — one JetStream account, per-USER least-priv permissions:
# JetStream streams are owned by an account; every service here shares the same
# streams (INGEST -> ENRICHED -> LLM_HEAVY -> CLAIM), and sharing a stream across
# accounts requires JS-API export/import plumbing that adds complexity without
# adding containment. Broker-enforced isolation (the PLAN's intent) is delivered by
# the per-user publish/subscribe allow-lists below: a compromised ingester's creds
# can publish `ingest.>` and literally nothing else — it cannot read any stream,
# not even its own. Revisit true multi-account + exports at 0b if quota isolation
# per zone becomes necessary.
#
# Credentials: generated IN-CLUSTER (PLAN §3.5) into a Secret, injected as env vars;
# nats-server resolves $VAR from its environment. No literal secret lives here.
#
# ⚠ The $JS.API.* subject shapes below match nats-py 2.x (ensure_stream +
# pull_subscribe durables + KV). Validate against a live broker on k3d (task 10)
# before trusting them — an over-tight list fails loud (permission violation),
# which is the failure mode we want.

port: 4222
http: 8222 # /healthz + prometheus scrape

jetstream {
  store_dir: /data
}

system_account: SYS

accounts {
  SYS: {
    users: [{ user: sys, password: $NATS_PASS_SYS }]
  }

  PIPELINE: {
    jetstream: enabled
    users: [
      # ── zone-ingest ── publish-only into its own subject tree ──────────────
      # (usgs predates the per-source tightening and keeps ingest.>; new ingesters
      # get exactly their own ingest.<source> subject — narrower blast radius.)
      {
        user: usgs
        password: $NATS_PASS_USGS
        permissions: {
          publish: [
            "ingest.>",
            "$JS.API.STREAM.CREATE.INGEST", "$JS.API.STREAM.UPDATE.INGEST",
            "$JS.API.STREAM.INFO.INGEST"
          ]
          subscribe: ["_INBOX.>"] # request/reply inbox only
        }
      },

      {
        user: noaa
        password: $NATS_PASS_NOAA
        permissions: {
          publish: [
            "ingest.noaa",
            "$JS.API.STREAM.CREATE.INGEST", "$JS.API.STREAM.UPDATE.INGEST",
            "$JS.API.STREAM.INFO.INGEST"
          ]
          subscribe: ["_INBOX.>"] # request/reply inbox only
        }
      },

      {
        user: state
        password: $NATS_PASS_STATE
        permissions: {
          publish: [
            "ingest.state",
            "$JS.API.STREAM.CREATE.INGEST", "$JS.API.STREAM.UPDATE.INGEST",
            "$JS.API.STREAM.INFO.INGEST"
          ]
          subscribe: ["_INBOX.>"] # request/reply inbox only
        }
      },

      {
        user: dod
        password: $NATS_PASS_DOD
        permissions: {
          publish: [
            "ingest.dod",
            "$JS.API.STREAM.CREATE.INGEST", "$JS.API.STREAM.UPDATE.INGEST",
            "$JS.API.STREAM.INFO.INGEST"
          ]
          subscribe: ["_INBOX.>"] # request/reply inbox only
        }
      },

      {
        user: cisa
        password: $NATS_PASS_CISA
        permissions: {
          publish: [
            "ingest.cisa",
            "$JS.API.STREAM.CREATE.INGEST", "$JS.API.STREAM.UPDATE.INGEST",
            "$JS.API.STREAM.INFO.INGEST"
          ]
          subscribe: ["_INBOX.>"] # request/reply inbox only
        }
      },

      {
        user: cdc
        password: $NATS_PASS_CDC
        permissions: {
          publish: [
            "ingest.cdc",
            "$JS.API.STREAM.CREATE.INGEST", "$JS.API.STREAM.UPDATE.INGEST",
            "$JS.API.STREAM.INFO.INGEST"
          ]
          subscribe: ["_INBOX.>"] # request/reply inbox only
        }
      },

      {
        user: gdacs
        password: $NATS_PASS_GDACS
        permissions: {
          publish: [
            "ingest.gdacs",
            "$JS.API.STREAM.CREATE.INGEST", "$JS.API.STREAM.UPDATE.INGEST",
            "$JS.API.STREAM.INFO.INGEST"
          ]
          subscribe: ["_INBOX.>"] # request/reply inbox only
        }
      },

      {
        user: wikipedia
        password: $NATS_PASS_WIKIPEDIA
        permissions: {
          publish: [
            "ingest.wikipedia",
            "$JS.API.STREAM.CREATE.INGEST", "$JS.API.STREAM.UPDATE.INGEST",
            "$JS.API.STREAM.INFO.INGEST"
          ]
          subscribe: ["_INBOX.>"] # request/reply inbox only
        }
      },

      {
        user: bluesky
        password: $NATS_PASS_BLUESKY
        permissions: {
          publish: [
            "ingest.bluesky",
            "$JS.API.STREAM.CREATE.INGEST", "$JS.API.STREAM.UPDATE.INGEST",
            "$JS.API.STREAM.INFO.INGEST"
          ]
          subscribe: ["_INBOX.>"] # request/reply inbox only
        }
      },

      {
        user: mastodon
        password: $NATS_PASS_MASTODON
        permissions: {
          publish: [
            "ingest.mastodon",
            "$JS.API.STREAM.CREATE.INGEST", "$JS.API.STREAM.UPDATE.INGEST",
            "$JS.API.STREAM.INFO.INGEST"
          ]
          subscribe: ["_INBOX.>"] # request/reply inbox only
        }
      },

      {
        user: gdelt
        password: $NATS_PASS_GDELT
        permissions: {
          publish: [
            "ingest.gdelt",
            "$JS.API.STREAM.CREATE.INGEST", "$JS.API.STREAM.UPDATE.INGEST",
            "$JS.API.STREAM.INFO.INGEST"
          ]
          subscribe: ["_INBOX.>"] # request/reply inbox only
        }
      },

      # ── zone-process / inference (enrich): INGEST -> ENRICHED + KV dedup ───
      # (+ tally.> publish-only: the §6.6 per-minute velocity flush. Enrich only
      # PRODUCES tallies — no TALLY consumer APIs, the db-writer reads them.)
      {
        user: enrich
        password: $NATS_PASS_ENRICH
        permissions: {
          publish: [
            "enriched.>",
            "tally.>",
            "$JS.API.STREAM.CREATE.INGEST", "$JS.API.STREAM.UPDATE.INGEST",
            "$JS.API.STREAM.INFO.INGEST",
            "$JS.API.STREAM.CREATE.ENRICHED", "$JS.API.STREAM.UPDATE.ENRICHED",
            "$JS.API.STREAM.INFO.ENRICHED",
            "$JS.API.STREAM.CREATE.TALLY", "$JS.API.STREAM.UPDATE.TALLY",
            "$JS.API.STREAM.INFO.TALLY",
            "$JS.API.CONSUMER.CREATE.INGEST", "$JS.API.CONSUMER.CREATE.INGEST.>",
            "$JS.API.CONSUMER.DURABLE.CREATE.INGEST.>",
            "$JS.API.CONSUMER.INFO.INGEST.>", "$JS.API.CONSUMER.MSG.NEXT.INGEST.>",
            "$JS.ACK.INGEST.>",
            "$KV.dedup.>",
            "$JS.API.STREAM.CREATE.KV_dedup", "$JS.API.STREAM.UPDATE.KV_dedup",
            "$JS.API.STREAM.INFO.KV_dedup",
            "$JS.API.DIRECT.GET.KV_dedup", "$JS.API.DIRECT.GET.KV_dedup.>",
            "$JS.API.STREAM.MSG.GET.KV_dedup",
            # models-KV READ ONLY (§6.3 online retrain): enrich POLLS KV_models for a
            # promoted classifier and hot-swaps it. Bind (STREAM.INFO) + get
            # (DIRECT.GET / MSG.GET) — no create, no consumer, no publish into models.
            "$JS.API.STREAM.INFO.KV_models",
            "$JS.API.DIRECT.GET.KV_models", "$JS.API.DIRECT.GET.KV_models.>",
            "$JS.API.STREAM.MSG.GET.KV_models"
          ]
          subscribe: ["_INBOX.>"]
        }
      },

      # ── zone-process / retrain: weak labels -> train -> eval gate -> models KV ─────
      # (§6.3 step 2, §4). Writes ONLY the models KV bucket (create + put + read-back
      # for the eval baseline); no app subject, no other stream. Poisoning risk is held
      # by the eval gate in services/retrain/evalx, not by this ACL.
      {
        user: retrain
        password: $NATS_PASS_RETRAIN
        permissions: {
          publish: [
            "$KV.models.>",
            "$JS.API.STREAM.CREATE.KV_models", "$JS.API.STREAM.UPDATE.KV_models",
            "$JS.API.STREAM.INFO.KV_models",
            "$JS.API.DIRECT.GET.KV_models", "$JS.API.DIRECT.GET.KV_models.>",
            "$JS.API.STREAM.MSG.GET.KV_models"
          ]
          subscribe: ["_INBOX.>"]
        }
      },

      # ── zone-process / db-writer: ENRICHED + TALLY consumer (no publish tree) ─
      # (TALLY consumer = §6.6 velocity persistence; still cannot publish into any
      # app subject, so a compromised writer cannot forge pipeline traffic.)
      {
        user: writer
        password: $NATS_PASS_WRITER
        permissions: {
          publish: [
            "$JS.API.STREAM.CREATE.ENRICHED", "$JS.API.STREAM.UPDATE.ENRICHED",
            "$JS.API.STREAM.INFO.ENRICHED",
            "$JS.API.CONSUMER.CREATE.ENRICHED", "$JS.API.CONSUMER.CREATE.ENRICHED.>",
            "$JS.API.CONSUMER.DURABLE.CREATE.ENRICHED.>",
            "$JS.API.CONSUMER.INFO.ENRICHED.>", "$JS.API.CONSUMER.MSG.NEXT.ENRICHED.>",
            "$JS.ACK.ENRICHED.>",
            "$JS.API.STREAM.CREATE.TALLY", "$JS.API.STREAM.UPDATE.TALLY",
            "$JS.API.STREAM.INFO.TALLY",
            "$JS.API.CONSUMER.CREATE.TALLY", "$JS.API.CONSUMER.CREATE.TALLY.>",
            "$JS.API.CONSUMER.DURABLE.CREATE.TALLY.>",
            "$JS.API.CONSUMER.INFO.TALLY.>", "$JS.API.CONSUMER.MSG.NEXT.TALLY.>",
            "$JS.ACK.TALLY.>"
          ]
          subscribe: ["_INBOX.>"]
        }
      },

      # ── zone-process / cluster: ENRICHED consumer -> gated llm.heavy producer ─
      {
        user: cluster
        password: $NATS_PASS_CLUSTER
        permissions: {
          publish: [
            "llm.>",
            "$JS.API.STREAM.CREATE.ENRICHED", "$JS.API.STREAM.UPDATE.ENRICHED",
            "$JS.API.STREAM.INFO.ENRICHED",
            "$JS.API.STREAM.CREATE.LLM_HEAVY", "$JS.API.STREAM.UPDATE.LLM_HEAVY",
            "$JS.API.STREAM.INFO.LLM_HEAVY",
            "$JS.API.CONSUMER.CREATE.ENRICHED", "$JS.API.CONSUMER.CREATE.ENRICHED.>",
            "$JS.API.CONSUMER.DURABLE.CREATE.ENRICHED.>",
            "$JS.API.CONSUMER.INFO.ENRICHED.>", "$JS.API.CONSUMER.MSG.NEXT.ENRICHED.>",
            "$JS.ACK.ENRICHED.>"
          ]
          subscribe: ["_INBOX.>"]
        }
      },

      # ── zone-process / claimx: llm.heavy consumer -> claim.* producer (no DB) ─
      {
        user: claimx
        password: $NATS_PASS_CLAIMX
        permissions: {
          publish: [
            "claim.>",
            "$JS.API.STREAM.CREATE.LLM_HEAVY", "$JS.API.STREAM.UPDATE.LLM_HEAVY",
            "$JS.API.STREAM.INFO.LLM_HEAVY",
            "$JS.API.STREAM.CREATE.CLAIM", "$JS.API.STREAM.UPDATE.CLAIM",
            "$JS.API.STREAM.INFO.CLAIM",
            "$JS.API.CONSUMER.CREATE.LLM_HEAVY", "$JS.API.CONSUMER.CREATE.LLM_HEAVY.>",
            "$JS.API.CONSUMER.DURABLE.CREATE.LLM_HEAVY.>",
            "$JS.API.CONSUMER.INFO.LLM_HEAVY.>", "$JS.API.CONSUMER.MSG.NEXT.LLM_HEAVY.>",
            "$JS.ACK.LLM_HEAVY.>"
          ]
          subscribe: ["_INBOX.>"]
        }
      }

      # ── zone-process / trust: claim.* consumer, NO app-subject publish (§6.5) ─
      # Structured-data pod (parameterized SQL over stored fields, no model): it
      # promotes Stories to primary_backed when a social claim aligns with a
      # primary/authoritative record. Consume-only on CLAIM; cannot produce into
      # any stream, so a compromised matcher cannot forge pipeline traffic.
      {
        user: trust
        password: $NATS_PASS_TRUST
        permissions: {
          publish: [
            "$JS.API.STREAM.CREATE.CLAIM", "$JS.API.STREAM.UPDATE.CLAIM",
            "$JS.API.STREAM.INFO.CLAIM",
            "$JS.API.CONSUMER.CREATE.CLAIM", "$JS.API.CONSUMER.CREATE.CLAIM.>",
            "$JS.API.CONSUMER.DURABLE.CREATE.CLAIM.>",
            "$JS.API.CONSUMER.INFO.CLAIM.>", "$JS.API.CONSUMER.MSG.NEXT.CLAIM.>",
            "$JS.ACK.CLAIM.>"
          ]
          subscribe: ["_INBOX.>"]
        }
      }
    ]
  }
}
