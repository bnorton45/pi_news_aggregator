# zone-process (PLAN §3.1, §3.3): default-deny; NO internet egress at all.
# The inference/db-writer split is enforced here by pod label:
#   role=inference  (enrich, claimx, future classify/borderline workers) — NATS only,
#                   plus Ollama for the LLM clients; NO route to Postgres.
#   role=db-writer / role=cluster / role=trust / role=score — the only pods that may
#                   reach Postgres (5432); all structured-data, no model over raw text.
#   app=ollama      — the model host; accepts 11434 from role=inference, reaches nothing.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: zone-process
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: zone-process
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-nats
  namespace: zone-process
spec:
  podSelector: {} # every worker in this zone talks JetStream
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              zone: data
          podSelector:
            matchLabels:
              app: nats
      ports:
        - { protocol: TCP, port: 4222 }
---
# ONLY the structured-data pods reach Postgres (PLAN §3.3): db-writer + cluster +
# trust (§6.5 primary-match) + score (§6.6 gap scoring) + retrain (§6.3 read-only
# weak_labels, write-only system_state) — parameterized SQL, no model over raw text.
# Inference pods (role=inference) have no rule here => no route to zone-data:5432.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-db-rw
  namespace: zone-process
spec:
  podSelector:
    matchExpressions:
      - { key: role, operator: In, values: [db-writer, cluster, trust, score, retrain] }
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              zone: data
          podSelector:
            matchLabels:
              app: postgres
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ollama-clients
  namespace: zone-process
spec:
  podSelector:
    matchLabels:
      role: inference
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: ollama
      ports:
        - { protocol: TCP, port: 11434 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ollama-ingress
  namespace: zone-process
spec:
  podSelector:
    matchLabels:
      app: ollama
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              role: inference
      ports:
        - { protocol: TCP, port: 11434 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-metrics-scrape
  namespace: zone-process
spec:
  podSelector: {}
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              zone: data
          podSelector:
            matchLabels:
              app: prometheus
      ports:
        - { protocol: TCP, port: metrics }
