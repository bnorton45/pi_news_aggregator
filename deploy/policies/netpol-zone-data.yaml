# zone-data (PLAN §3.1): default-deny; no internet. State is *reached*, it reaches
# nothing (exception: Prometheus, which must scrape the other zones + the API server
# for service discovery).
#
# Postgres ingress is the tightest rule in the cluster: db-writer + cluster + trust
# + score (RW creds) + retrain (weak_labels-read + system_state-write) from
# zone-process, api + notify (DB read-only role) from zone-present. Nothing else — not
# even the rest of zone-data.
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny
  namespace: zone-data
spec:
  podSelector: {}
  policyTypes: [Ingress, Egress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: zone-data
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - { protocol: UDP, port: 53 }
        - { protocol: TCP, port: 53 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: nats-ingress
  namespace: zone-data
spec:
  podSelector:
    matchLabels:
      app: nats
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              zone: ingest
          podSelector:
            matchLabels:
              role: ingester
        - namespaceSelector:
            matchLabels:
              zone: process
      ports:
        - { protocol: TCP, port: 4222 }
    - from: # monitoring endpoint, same zone only
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - { protocol: TCP, port: 8222 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-ingress
  namespace: zone-data
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              zone: process
          podSelector:
            matchExpressions:
              - { key: role, operator: In, values: [db-writer, cluster, trust, score, retrain] }
        - namespaceSelector:
            matchLabels:
              zone: present
          podSelector:
            matchExpressions:
              # api + notify: both hold the read-only api_ro role, enforced
              # again at the Postgres grant (§6.8).
              - { key: role, operator: In, values: [api, notify] }
        - podSelector:
            matchLabels:
              app: partition-cron # 5-day-wall CronJob (PLAN §4), same zone
      ports:
        - { protocol: TCP, port: 5432 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: partition-cron-egress
  namespace: zone-data
spec:
  podSelector:
    matchLabels:
      app: partition-cron
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - { protocol: TCP, port: 5432 }
---
# Prometheus: scrape every zone's named `metrics` port + the API server for k8s SD.
# The API server is not a pod, so its rule must be an ipBlock; scope it to 6443 only.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: prometheus-egress
  namespace: zone-data
spec:
  podSelector:
    matchLabels:
      app: prometheus
  policyTypes: [Egress]
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              zone: ingest
        - namespaceSelector:
            matchLabels:
              zone: process
        - namespaceSelector:
            matchLabels:
              zone: present
        - podSelector: {} # same-zone exporters (nats 8222, postgres exporter)
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8 # k3s API server / node addresses (kube SD)
        - ipBlock:
            cidr: 192.168.0.0/16
      ports:
        - { protocol: TCP, port: 6443 }
---
# Grafana is user-facing (PLAN §7 dashboard) but lives with its data source; only the
# k3s ingress controller (traefik, kube-system) may reach it.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-ingress
  namespace: zone-data
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              app.kubernetes.io/name: traefik
      ports:
        - { protocol: TCP, port: 3000 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana-to-prometheus
  namespace: zone-data
spec:
  podSelector:
    matchLabels:
      app: grafana
  policyTypes: [Egress]
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: prometheus
      ports:
        - { protocol: TCP, port: 9090 }
