# SOPS creation rules (PLAN §3.5-§3.6): ONLY deploy/secrets/*.sops.yaml may hold
# encrypted material; everything else with a secret shape is a scanner violation.
# AGE RECIPIENT is a PLACEHOLDER — replace with the real public key generated by the
# bootstrap runbook (`age-keygen`, task 10/0b). The private key never enters the repo.
creation_rules:
  - path_regex: deploy/secrets/.*\.sops\.yaml$
    encrypted_regex: ^(data|stringData)$
    age: age1qqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqqplaceh
