# PLAN §3.6 gate 3: scan every push/PR AND full git history; fail on any hit.
# This is the backstop behind the local pre-commit gate (gate 2). Because git
# history is forever, this runs over the ENTIRE history, not just the diff.
name: secret-scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0  # full history — the whole point of this gate

      - name: gitleaks (full history, fail on hit)
        run: |
          docker run --rm -v "$PWD:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.18.4 \
            detect --source=/repo --redact --verbose --exit-code 1

      - name: trufflehog (full history, verified secrets)
        # Scan the whole git history directly — avoids the action's BASE..HEAD diff
        # logic, which errors on initial/single-commit pushes. `latest` keeps
        # detectors current (gitleaks above is pinned for reproducibility).
        run: |
          docker run --rm -v "$PWD:/repo" \
            trufflesecurity/trufflehog:latest \
            git file:///repo --only-verified --fail
