# The Pi 5 nodes are arm64, and a wheel that quietly lacks an aarch64 build (the
# onnxruntime dependency in enrich/retrain is the prime
# suspect class) would otherwise only surface while debugging on the device. Build
# the arm64 images under QEMU and actually import the hot dependencies — a pure
# `docker build` isn't enough, since pip can succeed while the compiled module
# fails to load on the target arch.
name: arm64-smoke

on:
  pull_request:
    paths:
      - "Dockerfile"
      - "pyproject.toml"
      - "libs/**"
      - "services/**"
      - ".github/workflows/arm64-smoke.yml"
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: arm64-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # Per-image import lists mirror the pyproject extras: compiled/native
          # wheels first (numpy, onnxruntime, asyncpg), then the repo modules that
          # exercise them (onnx_classifier loads onnxruntime; retrain.train authors
          # ONNX graphs via the onnx package).
          - extra: enrich
            smoke: "import numpy, onnxruntime, asyncpg, pgvector, nats; import libs.classify.onnx_classifier; print('arm64 ok: enrich')"
          - extra: retrain
            smoke: "import numpy, onnx, onnxruntime, asyncpg, nats; import services.retrain.train; print('arm64 ok: retrain')"
          - extra: ingest
            smoke: "import httpx, websockets, nats, defusedxml; import libs.schema, services.ingest.rss; print('arm64 ok: ingest')"
          - extra: api
            smoke: "import fastapi, uvicorn, asyncpg, httpx; print('arm64 ok: api')"
    steps:
      - uses: actions/checkout@v7

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build linux/arm64 image (EXTRA=${{ matrix.extra }})
        run: |
          docker buildx build --platform linux/arm64 \
            --build-arg EXTRA=${{ matrix.extra }} \
            -t news_aggregator/${{ matrix.extra }}:arm64 --load .

      - name: "ASSERT: arm64 import smoke (EXTRA=${{ matrix.extra }})"
        run: |
          docker run --rm --platform linux/arm64 \
            news_aggregator/${{ matrix.extra }}:arm64 \
            python -c "${{ matrix.smoke }}"
